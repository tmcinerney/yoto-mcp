name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t yoto-mcp:ci .
